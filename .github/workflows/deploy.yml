name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["main"] # Cambia a "master" si es el nombre de tu rama principal

  # Permite ejecutar este workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Configura los permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se acumulen ejecuciones simultáneas
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Aquí indicamos que solo queremos subir el contenido de la carpeta /docs
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4